name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint, Type-check, Test, Dead Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (lint + format)
        run: pnpm check

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vitest
        run: pnpm test

      - name: Knip (dead code)
        run: pnpm knip

  playwright:
    name: Playwright E2E (non-blocking)
    runs-on: ubuntu-latest
    needs: [ci]
    # Non-blocking until the app is deployed to a stable environment.
    # Failures show as warnings in the PR but do not prevent merging.
    # Revisit when a staging/production deployment target exists.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .dev.vars for local Wrangler dev server
        run: |
          cat > .dev.vars << 'EOF'
          GOOGLE_CLIENT_ID=ci-dummy
          GOOGLE_CLIENT_SECRET=ci-dummy
          ALLOWED_EMAILS=test@example.com
          CYPRESS=true
          GOOGLE_REDIRECT_URI=http://localhost:3000/api/auth/callback/google
          EOF

      - name: Apply D1 migrations (local)
        run: |
          npx wrangler d1 execute finance --local --file=migrations/0001_create_transactions.sql
          npx wrangler d1 execute finance --local --file=migrations/0002_create_sessions.sql
          npx wrangler d1 execute finance --local --file=migrations/0003_create_categories.sql
          npx wrangler d1 execute finance --local --file=migrations/0004_create_portfolio_entries.sql
          npx wrangler d1 execute finance --local --file=migrations/0005_create_stories.sql
          npx wrangler d1 execute finance --local --file=migrations/0006_create_whatsapp_conversations.sql

      - name: Run Playwright E2E tests
        run: npm run pw:run

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [ci, playwright]
    # Only deploy on pushes to main, and only if ci passed.
    # playwright is non-blocking (continue-on-error), so its failure won't block deploy.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Notify WhatsApp — deploy success
        if: success() && env.WORKER_NOTIFY_SECRET != ''
        env:
          WORKER_NOTIFY_SECRET: ${{ secrets.WORKER_NOTIFY_SECRET }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          curl -s -X POST https://app.ricardowgomes.workers.dev/api/github/webhook \
            -H "Authorization: Bearer $WORKER_NOTIFY_SECRET" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"deploy\",
              \"status\": \"success\",
              \"deploy_url\": \"https://app.ricardowgomes.workers.dev\",
              \"commit_message\": \"$COMMIT_MSG\"
            }"

      - name: Notify WhatsApp — deploy failure
        if: failure() && env.WORKER_NOTIFY_SECRET != ''
        env:
          WORKER_NOTIFY_SECRET: ${{ secrets.WORKER_NOTIFY_SECRET }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          curl -s -X POST https://app.ricardowgomes.workers.dev/api/github/webhook \
            -H "Authorization: Bearer $WORKER_NOTIFY_SECRET" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"deploy\",
              \"status\": \"failure\",
              \"deploy_url\": \"https://app.ricardowgomes.workers.dev\",
              \"commit_message\": \"$COMMIT_MSG\"
            }"
