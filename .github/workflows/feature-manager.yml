name: Feature Manager — Auto-implement

# Two jobs, both triggered by issue label events:
#
# plan        — fires on "status: in story writing"
#               Claude reads the issue + codebase and writes an implementation plan,
#               posts it as an issue comment, then moves the issue to "status: ready to pull".
#
# implement   — fires on "status: ready to pull"
#               Claude Code implements the feature on a branch and opens a PR.
#               The PR body contains "Closes #N" so GitHub auto-closes the issue on merge.

on:
  issues:
    types: [labeled]

jobs:
  plan:
    name: Plan issue
    if: "github.event.label.name == 'status: in story writing'"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write planning prompt
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node -e "
            const num = process.env.ISSUE_NUMBER;
            const title = process.env.ISSUE_TITLE;
            const body = process.env.ISSUE_BODY || '';
            const prompt = [
              '# Issue #' + num + ': ' + title,
              '',
              body,
              '',
              '---',
              '',
              '## Your Task: Write an Implementation Plan',
              '',
              'You are a PLANNING agent. Your only job is to read the issue and codebase,',
              'then produce a detailed implementation plan.',
              '',
              'STRICT RULES:',
              '- Do NOT write, edit, or delete any repository files',
              '- Do NOT create branches, commits, or run build commands',
              '- ONLY read files (Read/Glob/Grep) and write your plan to /tmp/implementation-plan.md',
              '',
              'STEPS:',
              '1. Read CLAUDE.md and docs/architecture.md to understand project conventions',
              '2. Explore relevant source files for context on the issue',
              '3. Write your plan to /tmp/implementation-plan.md',
              '',
              'Your plan must include:',
              '- **Summary**: What needs to be built and why',
              '- **Approach**: Technical approach and key decisions',
              '- **Files to create/modify**: List with brief descriptions of changes',
              '- **Tests**: Unit, integration, and E2E test plan per the testing strategy in CLAUDE.md',
              '- **Acceptance criteria**: How to verify the feature is complete',
            ].join('\n');
            require('fs').writeFileSync('/tmp/planning-prompt.md', prompt);
          "

      - name: Generate implementation plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print --dangerously-skip-permissions \
            --allowedTools "Read,Glob,Grep,Write,Agent" \
            --max-turns 50 \
            "$(cat /tmp/planning-prompt.md)"

      - name: Post plan and transition to ready
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ ! -f /tmp/implementation-plan.md ]; then
            echo "Error: Claude did not produce /tmp/implementation-plan.md"
            exit 1
          fi

          printf '## 🤖 Implementation Plan\n\n' > /tmp/comment-body.md
          cat /tmp/implementation-plan.md >> /tmp/comment-body.md
          printf '\n\n---\n*Generated by Claude Code. Review before implementation starts.*' >> /tmp/comment-body.md

          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/comment-body.md

          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "status: in story writing" \
            --add-label "status: ready to pull"

      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⚠️ Planning failed. Issue remains in 'status: in story writing'. See [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

  implement:
    name: Implement issue
    if: "github.event.label.name == 'status: ready to pull'"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Transition issue to in progress
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "status: ready to pull" \
            --add-label "status: in progress"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.email "claude-code[bot]@users.noreply.github.com"
          git config user.name "Claude Code"

      - name: Create feature branch
        id: branch
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-40)
          BRANCH="feat/issue-${ISSUE_NUMBER}-${SLUG}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write feature spec
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node -e "
            const num = process.env.ISSUE_NUMBER;
            const title = process.env.ISSUE_TITLE;
            const body = process.env.ISSUE_BODY || '';
            const spec = '# Issue #' + num + ': ' + title + '\n\n' + body + '\n';
            require('fs').writeFileSync('/tmp/feature-spec.md', spec);
          "

      - name: Implement feature
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          claude --print --dangerously-skip-permissions \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,TodoWrite,Agent" \
            --max-turns 200 \
            "$(cat /tmp/feature-spec.md)"

      - name: Create pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          PR_BODY=$(printf 'Closes #%s\n\nImplemented autonomously via Feature Manager.\n\n🤖 Generated with [Claude Code](https://claude.ai/claude-code)' "$ISSUE_NUMBER")

          PR_URL=$(gh pr create \
            --title "feat: $ISSUE_TITLE" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH" 2>/dev/null) || true

          # If already exists, get the URL
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr view "$BRANCH" --json url -q .url 2>/dev/null || echo "")
          fi

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Comment on issue with PR link
        if: steps.pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 PR ready for review: $PR_URL — issue will close automatically on merge."

      - name: Revert label and comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "status: in progress" \
            --add-label "status: ready to pull"
          gh issue comment ${{ github.event.issue.number }} \
            --body "⚠️ Auto-implementation failed. Reverted to 'status: ready to pull'. See [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
